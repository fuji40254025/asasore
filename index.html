    text-align: center;
    padding: 12px;

    font-size: 1.05rem;
    font-weight: bold;
    letter-spacing: 0.1em;
  }

    display: none;
    animation: odaiPop 0.35s ease-out;
  }

    font-size: clamp(2.2rem, 11vw, 4.2rem);

    line-height: 1.2;
  }
  .odai-line1 .kana {
    font-size: clamp(3rem, 15vw, 5.6rem);
    color: #ff5fa2;
    text-shadow: 0 0 22px rgba(255, 110, 180, 0.7), 0 2px 4px rgba(0,0,0,0.6);
    padding: 0 0.08em;

  .odai-line2 {
    margin-top: 10px;
    font-size: clamp(1.5rem, 7vw, 2.8rem);
    font-weight: 900;
    color: #ffffff;
    text-shadow: 0 0 14px rgba(255, 255, 255, 0.25), 0 2px 4px #000;
    line-height: 1.35;
  }

    flex: 0 0 auto;

    height: min(52vw, 230px);
    border-radius: 50%;
    border: 4px solid #ffcf4d;
    background: radial-gradient(circle at 35% 30%, #ff8a3d, #ff5fa2 55%, #c83fb0);
    color: #fff;
    font-size: clamp(1.5rem, 7vw, 2.2rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow: 0 0 35px rgba(255, 130, 80, 0.55), inset 0 -8px 18px rgba(0,0,0,0.25);
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    transition: transform 0.08s;
    touch-action: manipulation;
  }
  #main-btn:active { transform: scale(0.94); }

    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-bottom: 4px;
  }

  #timer-display {
    font-size: clamp(3rem, 14vw, 4.5rem);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: #fff;
    text-shadow: 0 0 12px rgba(120,200,255,0.4), 0 2px 4px rgba(0,0,0,0.5);
    line-height: 1;
  }

    display: none;
    font-size: clamp(1.4rem, 7vw, 2.2rem);
    font-weight: 900;
    color: #ffd24d;
    text-shadow: 0 0 16px rgba(255,200,60,0.7);
    animation: timerBlink 0.6s infinite;
  }

    width: 56px; height: 44px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }
  .timer-adjust:active { background: rgba(255,255,255,0.22); }

  #timer-btn {
    min-width: 150px;
    padding: 12px 26px;
    border-radius: 12px;
    border: 2px solid #2ec5d3;
    background: linear-gradient(180deg, #34d1c5, #1f8fb0);
    color: #fff;
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(60, 200, 210, 0.45);
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    touch-action: manipulation;
  }
  #timer-btn:active { transform: scale(0.96); }
  #timer-btn.running {
    border-color: #ffb13d;
    background: linear-gradient(180deg, #ffb13d, #e07b1f);
    box-shadow: 0 0 18px rgba(255, 170, 60, 0.45);
  }

  #roulette-banner {
    position: absolute;
    top: 14px;
    right: 12px;
    padding: 10px 16px;
    background: linear-gradient(160deg, #ff6e3d, #ff3d8b);
    border: 2px solid #ffd24d;
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-align: center;
    line-height: 1.3;
    box-shadow: 0 0 14px rgba(255, 120, 80, 0.5);
    animation: bannerPulse 1.8s infinite;
    transform: rotate(3deg);
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    user-select: none;
    touch-action: manipulation;
    z-index: 5;
  }
  @keyframes bannerPulse {
    0%, 100% { transform: rotate(3deg) scale(1); box-shadow: 0 0 12px rgba(255, 120, 80, 0.45); }
    50% { transform: rotate(3deg) scale(1.06); box-shadow: 0 0 24px rgba(255, 150, 80, 0.8); }
  }
  #roulette-banner:active { transform: rotate(3deg) scale(0.95); }

  /* ============ ルーレット画面 ============ */

  #roulette-screen { justify-content: flex-start; gap: 8px; }

  #back-btn {
    position: absolute;
    top: 14px; left: 12px;
    padding: 8px 14px;
    background: #1d1d22;
    border: 2px solid #3a3a42;
    border-radius: 8px;
    color: #cfc8ba;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    z-index: 5;

    font-weight: 900;
    color: #ff9c9c;
    text-shadow: 0 0 12px rgba(255, 60, 60, 0.5);
    letter-spacing: 0.08em;
    text-align: center;

    color: #8a8276;
    letter-spacing: 0.15em;

    height: min(86vw, 380px);
    margin-top: 6px;

  #wheel-canvas { width: 100%; height: 100%; display: block; }

    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 30px solid #ffd86b;
    filter: drop-shadow(0 0 6px rgba(255, 200, 80, 0.8));

    border: 3px solid #8a1c1c;

    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 0, 0, 0.82);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    font-weight: 900;
    color: #ff2222;

    white-space: nowrap;
    line-height: 1;

  @keyframes resultSlam {
    0% { transform: scale(3); opacity: 0; }
    70% { transform: scale(0.92); opacity: 1; }
    100% { transform: scale(1); }
  }

  #result-label {
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    font-weight: 900;
    color: #ffd86b;
    letter-spacing: 0.3em;
    text-shadow: 0 0 10px rgba(255, 200, 80, 0.6);

    display: none;
    padding: 16px 44px;
    border-radius: 14px;
    border: 3px solid #1c5a8a;
    background: linear-gradient(180deg, #2980b9, #14496e);
    color: #eaf6ff;
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow: 0 0 22px rgba(50, 140, 210, 0.45);
    text-shadow: 0 1px 3px #000;
    touch-action: manipulation;
    animation: odaiPop 0.3s ease-out;
  }
  #replay-btn:active { transform: scale(0.95); }

  .title-mini {
    position: absolute;
    top: 16px; left: 14px;
    font-size: 0.8rem;
    color: #9fb0ff;
    font-weight: bold;
    letter-spacing: 0.15em;
    z-index: 1;
  }
</style>
</head>

<!-- ============ メイン画面 ============ -->
<div id="game-screen" class="screen active">

/* ==================== ユーティリティ ==================== */

const $ = (id) => document.getElementById(id);
const randPick = (arr) => arr[Math.floor(Math.random() * arr.length)];

/* ==================== お題生成 ==================== */

$("main-btn").addEventListener("click", () => {
  unlockAudio();
  $("odai-kana").textContent = randPick(KANA_POOL);
  $("odai-word").textContent = randPick(ODAI_WORDS);
  $("odai-placeholder").style.display = "none";
  const odaiText = $("odai-text");
  odaiText.style.display = "none";
  // アニメーションを再発火させるためリフロー
  void odaiText.offsetWidth;
  odaiText.style.display = "block";
});

/* ==================== タイマー ==================== */

let timerSeconds = 30;   // 設定秒数
let timerRemain = 30;    // 残り秒数
let timerInterval = null;

function renderTimer() {
  const d = $("timer-display");
  d.textContent = timerRemain;
  d.classList.toggle("warning", timerInterval !== null && timerRemain <= 5 && timerRemain > 0);
}

function stopTimer(resetRemain) {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  countdownSfx.pause();
  countdownSfx.currentTime = 0;
  if (resetRemain) timerRemain = timerSeconds;
  $("timer-btn").textContent = "スタート";
  $("timer-btn").classList.remove("running");
  $("timer-display").style.display = "block";
  $("timer-finished").style.display = "none";
  renderTimer();
}

$("timer-btn").addEventListener("click", () => {
  unlockAudio();
  if (timerInterval) {            // 動作中 → リセット
    stopTimer(true);
    return;
  }
  timerRemain = timerSeconds;     // 停止中 → スタート
  $("timer-btn").textContent = "リセット";
  $("timer-btn").classList.add("running");
  $("timer-finished").style.display = "none";
  $("timer-display").style.display = "block";
  renderTimer();
  timerInterval = setInterval(() => {
    timerRemain--;
    renderTimer();
    if (timerRemain === 5) {        // 残り5秒：数字が赤くなる瞬間にカウントダウン音
      playCountdown();
    }
    if (timerRemain <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      $("timer-display").style.display = "none";
      $("timer-finished").style.display = "block";
      $("timer-btn").textContent = "スタート";
      $("timer-btn").classList.remove("running");
    }
  }, 1000);
});

$("timer-minus").addEventListener("click", () => {
  if (timerInterval) return;
  timerSeconds = Math.max(10, timerSeconds - 10);
  timerRemain = timerSeconds;
  renderTimer();
});
$("timer-plus").addEventListener("click", () => {
  if (timerInterval) return;
  timerSeconds = Math.min(180, timerSeconds + 10);
  timerRemain = timerSeconds;
  renderTimer();
});

/* ==================== 画面遷移 ==================== */

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

$("roulette-banner").addEventListener("click", () => {
  unlockAudio();
  setupRoulette();
  showScreen("roulette-screen");
  startRouletteBgm();          // ルーレット画面のBGM開始
});

$("back-btn").addEventListener("click", () => {
  if (spinning) return;
  stopRouletteBgm();           // 離脱でBGM停止
  showScreen("game-screen");
});

/* ==================== ルーレット ==================== */

const canvas = $("wheel-canvas");
const ctx = canvas.getContext("2d");
const SIZE = canvas.width;       // 760
const CENTER = SIZE / 2;
const RADIUS = SIZE / 2 - 14;

let currentWheel = null;
let wheelAngle = 0;              // 現在の回転角（rad）
let spinning = false;

function setupRoulette() {
  currentWheel = randPick(WHEELS);
  wheelAngle = Math.random() * Math.PI * 2;
  $("wheel-title").textContent = `『${currentWheel.name}』`;
  $("spin-btn").disabled = false;
  drawWheel();
}

function drawWheel() {
  const values = currentWheel.values;
  const n = values.length;
  const arc = (Math.PI * 2) / n;

  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.save();
  ctx.translate(CENTER, CENTER);
  ctx.rotate(wheelAngle);

  for (let i = 0; i < n; i++) {
    const start = i * arc;
    const colorMap = (i % 2 === 0) ? VALUE_COLORS : VALUE_COLORS_ALT;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, RADIUS, start, start + arc);
    ctx.closePath();
    ctx.fillStyle = colorMap[values[i]];
    ctx.fill();
    ctx.strokeStyle = "#0d0d0f";
    ctx.lineWidth = 5;
    ctx.stroke();

    // ラベル「×N」
    ctx.save();
    ctx.rotate(start + arc / 2);
    ctx.translate(RADIUS * 0.65, 0);
    ctx.rotate(Math.PI / 2);
    ctx.fillStyle = values[i] === 0 ? "#cfd6dd" : "#ffd86b";
    ctx.font = "900 84px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.8)";
    ctx.shadowBlur = 8;
    ctx.fillText("×" + values[i], 0, 0);
    ctx.restore();
  }

  // 外周リング
  ctx.beginPath();
  ctx.arc(0, 0, RADIUS + 4, 0, Math.PI * 2);
  ctx.strokeStyle = "#8a6a1c";
  ctx.lineWidth = 8;
  ctx.stroke();

  // 中心の髑髏
  ctx.beginPath();
  ctx.arc(0, 0, 56, 0, Math.PI * 2);
  ctx.fillStyle = "#16161a";
  ctx.fill();
  ctx.strokeStyle = "#8a6a1c";
  ctx.lineWidth = 5;
  ctx.stroke();
  ctx.rotate(-wheelAngle);   // 髑髏は回転させない
  ctx.font = "52px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.shadowBlur = 0;
  ctx.fillText("☠️", 0, 4);

  ctx.restore();
}

$("spin-btn").addEventListener("click", () => {
  if (spinning) return;
  unlockAudio();
  spinning = true;
  $("spin-btn").disabled = true;
  $("back-btn").style.opacity = "0.3";

  const startAngle = wheelAngle;
  const extraTurns = 5 + Math.random() * 3;                // 5〜8回転
  const targetAngle = startAngle + extraTurns * Math.PI * 2 + Math.random() * Math.PI * 2;
  const duration = 4800 + Math.random() * 700;             // 約5秒
  const startTime = performance.now();

  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);                  // ease-out cubic
    wheelAngle = startAngle + (targetAngle - startAngle) * eased;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      finishSpin();
    }
  }
  requestAnimationFrame(frame);
});

function finishSpin() {
  spinning = false;
  $("back-btn").style.opacity = "1";

  // ポインタは真上（-90°）。どのセグメントか判定
  const values = currentWheel.values;
  const n = values.length;
  const arc = (Math.PI * 2) / n;
  const pointerAngle = -Math.PI / 2;
  // セグメントiは wheelAngle + i*arc 〜 +arc の範囲にある
  let rel = (pointerAngle - wheelAngle) % (Math.PI * 2);
  if (rel < 0) rel += Math.PI * 2;
  const index = Math.floor(rel / arc);
  const result = values[index];

  // 銃声 & 結果表示
  playGunshot();
  $("result-text").textContent = "☠️×" + result;
  $("result-overlay").classList.add("show");
  $("replay-btn").style.display = "none";
  setTimeout(() => { $("replay-btn").style.display = "block"; }, 1500);
}

$("replay-btn").addEventListener("click", () => {
  $("result-overlay").classList.remove("show");
  stopRouletteBgm();           // ルーレット離脱でBGM停止
  // メイン画面を初期状態に戻す
  $("odai-text").style.display = "none";
  $("odai-placeholder").style.display = "block";
  stopTimer(true);
  showScreen("game-screen");
});

/* ==================== 効果音 ==================== */

const gunshot = $("gunshot");
const countdownSfx = $("countdown");
const rouletteBgm = $("roulette-bgm");
let audioUnlocked = false;

// モバイルの自動再生制限対策：最初のタップで無音再生して各音源を解錠
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  [gunshot, countdownSfx].forEach((el) => {
    const v = el.volume;
    el.volume = 0;
    el.play().then(() => {
      el.pause();
      el.currentTime = 0;
      el.volume = v;
    }).catch(() => { el.volume = v; });
  });
}

function playGunshot() {
  gunshot.currentTime = 0;
  gunshot.play().catch(() => {});
}

function playCountdown() {
  countdownSfx.currentTime = 0;
  countdownSfx.play().catch(() => {});
}

function startRouletteBgm() {
  rouletteBgm.currentTime = 0;
  rouletteBgm.play().catch(() => {});
}

function stopRouletteBgm() {
  rouletteBgm.pause();
  rouletteBgm.currentTime = 0;
}

renderTimer();
</script>
</body>
